<!DOCTYPE html>
<html>

<head>
    <title>Forgot Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center">
    <a href="{% url 'login' %}" class="inline-flex items-center text-indigo-600 hover:text-indigo-800 font-medium mb-4">
        ← Back to Login
    </a>

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">

        <h1 class="text-2xl font-bold mb-4">
            Reset Password
        </h1>

        {% if messages %}
        {% for message in messages %}
        <div class="p-3 mb-4 rounded bg-blue-100">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input type="email" name="email" placeholder="Enter your email" class="w-full border p-3 rounded-lg mb-4"
                required>

            <button type="submit" class="w-full bg-indigo-600 text-white p-3 rounded-lg">
                Send Reset Link
            </button>
        </form>

    </div>

</body>

</html>
