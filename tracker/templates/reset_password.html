<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">

        <h1 class="text-2xl font-bold text-center mb-2">
            Create New Password
        </h1>

        <p class="text-center text-slate-500 mb-6">
            Enter your new password below.
        </p>

        {% if messages %}
        {% for message in messages %}
        <div class="mb-4 p-3 rounded bg-red-100 text-red-700">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input type="password" name="password" placeholder="New Password" class="w-full border p-3 rounded-lg mb-4"
                required>

            <input type="password" name="confirm_password" placeholder="Confirm Password"
                class="w-full border p-3 rounded-lg mb-6" required>

            <button type="submit" class="w-full bg-indigo-600 text-white p-3 rounded-lg hover:bg-indigo-700">
                Reset Password
            </button>
        </form>

    </div>

</body>

</html>
