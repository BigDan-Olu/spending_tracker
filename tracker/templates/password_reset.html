<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">

        <h1 class="text-2xl font-bold text-center mb-2">
            Reset Password
        </h1>

        <p class="text-center text-slate-500 mb-6">
            Enter your email address and we'll send you a password reset link.
        </p>

        {% if messages %}
        {% for message in messages %}
        <div class="mb-4 p-3 rounded bg-blue-100 text-blue-700">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input type="email" name="email" placeholder="Enter your email" class="w-full border p-3 rounded-lg mb-4"
                required>

            <button type="submit" class="w-full bg-indigo-600 text-white p-3 rounded-lg hover:bg-indigo-700">
                Send Reset Link
            </button>
        </form>

        <p class="text-center mt-4">
            <a href="{% url 'login' %}" class="text-indigo-600 hover:underline">
                Back to Login
            </a>
        </p>

    </div>

</body>

</html>
